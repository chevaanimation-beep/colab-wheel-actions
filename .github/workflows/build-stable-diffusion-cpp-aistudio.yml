name: Build stable-diffusion.cpp CUDA (Tencent CNB L40)

on:
  workflow_dispatch:
    inputs:
      sd_version:
        description: 'stable-diffusion.cpp version/tag to build (leave empty for latest master)'
        required: false
        default: ''

jobs:
  build:
    # 腾讯 CNB 也是 Ubuntu 22.04，GLIBC 版本天然一致，无需 Docker
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install CUDA Toolkit 12.4
      uses: Jimver/cuda-toolkit@v0.2.21
      id: cuda-toolkit
      with:
        cuda: '12.4.0'
        method: 'network'
        sub-packages: '["toolkit", "nvcc"]'

    - name: Verify NVCC
      run: |
        nvcc --version

    - name: Clone stable-diffusion.cpp
      run: |
        if [ -n "${{ github.event.inputs.sd_version }}" ]; then
          git clone --recursive --branch "${{ github.event.inputs.sd_version }}" https://github.com/leejet/stable-diffusion.cpp.git
        else
          git clone --recursive https://github.com/leejet/stable-diffusion.cpp.git
        fi

    - name: Build with CUDA
      run: |
        cd stable-diffusion.cpp
        mkdir build && cd build
        # L40 = Ada Lovelace 架构，CUDA Architecture = 89
        cmake .. -DSD_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=89
        cmake --build . --config Release -j$(nproc)

    - name: Package Artifacts
      run: |
        cd stable-diffusion.cpp/build
        mkdir -p ../../dist
        find . -maxdepth 2 -type f \( -name "sd" -o -name "sd-cli" -o -name "sd-server" -o -name "*.so" -o -name "*.a" \) -exec cp {} ../../dist/ \;
        if [ -d bin ]; then
          cp -r bin/* ../../dist/ 2>/dev/null || true
        fi
        ls -lh ../../dist/

    - name: Create GitHub Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        tag_name: sd-cpp-cnb-v1.0.${{ github.run_number }}
        name: "stable-diffusion.cpp CUDA Build for Tencent CNB (L40 / CUDA 12.4) v1.0.${{ github.run_number }}"
        body: |
          专为腾讯 CNB L40 环境编译的 stable-diffusion.cpp 二进制文件。
          - 编译环境: Ubuntu 22.04 (GitHub Actions)
          - 目标系统: 腾讯 CNB Ubuntu 22.04
          - CUDA 版本: 12.4
          - GPU 架构: NVIDIA L40 (Compute Capability 89, Ada Lovelace)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
