name: Build stable-diffusion.cpp CUDA (Baidu AIStudio V100)

on:
  workflow_dispatch:
    inputs:
      sd_version:
        description: 'stable-diffusion.cpp version/tag to build (leave empty for latest master)'
        required: false
        default: ''

jobs:
  build:
    # 宿主机用 ubuntu-22.04，但实际编译在 Docker 容器（Ubuntu 20.04 + CUDA 11.8）中执行
    # 这样编译产物链接的 GLIBC 2.31，与 AIStudio 完全兼容
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:11.8.0-devel-ubuntu20.04
      options: --user root

    steps:
    - name: Install Build Tools
      run: |
        apt-get update
        apt-get install -y git cmake g++ make

    - name: Verify Environment
      run: |
        cat /etc/os-release | head -3
        nvcc --version
        ldd --version | head -1

    - name: Clone stable-diffusion.cpp
      run: |
        if [ -n "${{ github.event.inputs.sd_version }}" ]; then
          git clone --recursive --branch "${{ github.event.inputs.sd_version }}" https://github.com/leejet/stable-diffusion.cpp.git
        else
          git clone --recursive https://github.com/leejet/stable-diffusion.cpp.git
        fi

    - name: Setup Swap (prevent OOM)
      run: |
        fallocate -l 6G /swapfile_build || true
        chmod 600 /swapfile_build
        mkswap /swapfile_build
        swapon /swapfile_build || true
        free -h

    - name: Build with CUDA
      run: |
        cd stable-diffusion.cpp
        mkdir build && cd build
        # V100 = Volta 架构，CUDA Architecture = 70
        # 限制 -j2 防止 OOM
        cmake .. -DSD_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=70 -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release -j2

    - name: Package Artifacts
      run: |
        cd stable-diffusion.cpp/build
        mkdir -p ../../dist
        find . -maxdepth 2 -type f \( -name "sd" -o -name "sd-cli" -o -name "sd-server" -o -name "*.so" -o -name "*.a" \) -exec cp {} ../../dist/ \;
        if [ -d bin ]; then
          cp -r bin/* ../../dist/ 2>/dev/null || true
        fi
        ls -lh ../../dist/

    - name: Create GitHub Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        tag_name: sd-cpp-aistudio-v1.0.${{ github.run_number }}
        name: "stable-diffusion.cpp CUDA Build for Baidu AIStudio (V100 / CUDA 11.8) v1.0.${{ github.run_number }}"
        body: |
          专为百度 AIStudio V100 环境编译的 stable-diffusion.cpp 二进制文件。
          - 编译环境: **Docker Ubuntu 20.04** + CUDA 11.8 (GLIBC 2.31)
          - 目标系统: 百度 AIStudio Ubuntu 20.04
          - CUDA 版本: 11.8
          - GPU 架构: Tesla V100-SXM2 (Compute Capability 70, Volta)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
