name: Build llama-cpp-python CUDA Wheel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.21
      id: cuda-toolkit
      with:
        cuda: '12.8.0'
        method: 'network'
        sub-packages: '["toolkit", "nvcc"]' # 修正这里

    - name: Verify NVCC
      run: |
        nvcc --version

    - name: Install Build Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install wheel setuptools scikit-build-core[pyproject]

    - name: Build Wheel with CUDA
      env:
        GGML_CUDA: 'on'
        # 优化：针对 Colab 的 T4 显卡（75架构）进行定向编译，速度更快
        CMAKE_ARGS: '-DGGML_CUDA=on -DCMAKE_CUDA_ARCHITECTURES=75'
      run: |
        pip wheel llama-cpp-python --wheel-dir=dist --no-deps

    - name: Create GitHub Release and Upload Wheel
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }} # 每次编译自动生成一个版本号
        name: Release CUDA Wheel v1.0.${{ github.run_number }}
        files: dist/*.whl
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动提供的权限，无需配置