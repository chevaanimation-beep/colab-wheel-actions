name: Build stable-diffusion.cpp CUDA

on:
  workflow_dispatch:
    inputs:
      sd_version:
        description: 'stable-diffusion.cpp version/tag to build (leave empty for latest master)'
        required: false
        default: ''

jobs:
  build:
    # 匹配 Colab 的 GLIBC 2.35 底座
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.21
      id: cuda-toolkit
      with:
        cuda: '12.8.0'
        method: 'network'
        sub-packages: '["toolkit", "nvcc"]'

    - name: Verify NVCC
      run: |
        nvcc --version

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebp-dev libwebm-dev

    - name: Clone stable-diffusion.cpp
      run: |
        if [ -n "${{ github.event.inputs.sd_version }}" ]; then
          git clone --recursive --branch "${{ github.event.inputs.sd_version }}" https://github.com/leejet/stable-diffusion.cpp.git
        else
          git clone --recursive https://github.com/leejet/stable-diffusion.cpp.git
        fi

    - name: Build with CUDA
      run: |
        cd stable-diffusion.cpp
        mkdir build && cd build
        cmake .. -DSD_CUDA=ON -DSD_USE_SYSTEM_WEBP=ON -DSD_USE_SYSTEM_WEBM=ON -DCMAKE_CUDA_ARCHITECTURES=75
        cmake --build . --config Release -j$(nproc)

    - name: Package Artifacts
      run: |
        cd stable-diffusion.cpp/build
        mkdir -p ../../dist
        # 收集编译产物（可执行文件）
        find . -maxdepth 2 -type f \( -name "sd" -o -name "sd-cli" -o -name "sd-server" -o -name "*.so" -o -name "*.a" \) -exec cp {} ../../dist/ \;
        # 如果 bin 目录下有产物也一并复制
        if [ -d bin ]; then
          cp -r bin/* ../../dist/ 2>/dev/null || true
        fi
        ls -lh ../../dist/

    - name: Create GitHub Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      with:
        tag_name: sd-cpp-v1.0.${{ github.run_number }}
        name: stable-diffusion.cpp CUDA Build v1.0.${{ github.run_number }}
        files: dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
