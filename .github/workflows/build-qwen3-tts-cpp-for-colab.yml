name: Build and Release for Colab

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*'

permissions:
  contents: write 

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Target Repository
      uses: actions/checkout@v4
      with:
        repository: predict-woo/qwen3-tts.cpp
        submodules: recursive

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.21
      id: cuda-toolkit
      with:
        cuda: '12.8.0'
        method: 'network'
        sub-packages: '["toolkit", "nvcc"]'

    # ================= 新增：修复 CI 环境缺少 libcuda.so.1 的问题 =================
    - name: Prepare CUDA Stubs (Fix libcuda.so.1 missing in CI)
      run: |
        # 1. 动态查找 CUDA stubs 目录
        CUDA_STUBS=$(ls -d /usr/local/cuda*/lib64/stubs 2>/dev/null | head -n 1)
       
