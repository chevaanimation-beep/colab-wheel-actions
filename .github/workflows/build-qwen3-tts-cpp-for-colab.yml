name: Build and Release for Colab

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*'

permissions:
  contents: write 

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Target Repository
      uses: actions/checkout@v4
      with:
        repository: predict-woo/qwen3-tts.cpp
        submodules: recursive

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.21
      id: cuda-toolkit
      with:
        cuda: '12.8.0'
        method: 'network'
        sub-packages: '["toolkit", "nvcc"]'

    # ================= 新增：修复 CI 环境缺少 libcuda.so.1 的问题 =================
    - name: Prepare CUDA Stubs (Fix libcuda.so.1 missing in CI)
      run: |
        # 1. 动态查找 CUDA stubs 目录
        CUDA_STUBS=$(ls -d /usr/local/cuda*/lib64/stubs 2>/dev/null | head -n 1)
        if [ -z "$CUDA_STUBS" ]; then
          echo "::error::CUDA stubs directory not found!"
          exit 1
        fi
        echo "Found CUDA stubs at: $CUDA_STUBS"
        
        # 2. 【修复】：加上 sudo 解决系统目录无写权限的问题
        if [ ! -f "$CUDA_STUBS/libcuda.so.1" ]; then
          sudo ln -s "$CUDA_STUBS/libcuda.so" "$CUDA_STUBS/libcuda.so.1"
        fi
        
        # 3. 将 stubs 目录注入全局环境变量
        echo "LIBRARY_PATH=$CUDA_STUBS:$LIBRARY_PATH" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=$CUDA_STUBS:$LD_LIBRARY_PATH" >> $GITHUB_ENV
    # =====================================================================

    - name: Build GGML with CUDA
      run: |
        cmake -S ggml -B ggml/build -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=75
        cmake --build ggml/build --config Release -j$(nproc)

    - name: Build qwen3-tts.cpp
      run: |
        # 环境变量 LIBRARY_PATH 已自动继承，链接器现在能找到 libcuda.so.1 了
        cmake -S . -B build
        cmake --build build --config Release -j$(nproc)

    - name: Package Artifacts
      run: |
        mkdir -p colab_dist
        cp build/qwen3-tts-cli colab_dist/
        
        # 【核心修复】：
        # 1. 扩大搜索路径至整个 ggml/build 和 build 目录
        # 2. 改为 "*.so*" 后缀，通吃所有版本号尾缀的文件
        # 3. 使用 cp -d 保留可能存在的软链接关系
        find ggml/build build -name "*.so*" -exec cp -d {} colab_dist/ \; 2>/dev/null || true
        
        # 打包输出
        tar -czvf qwen3-tts-colab.tar.gz -C colab_dist .

    - name: Create or Update Release
      uses: ncipollo/release-action@v1
      with:
        tag: "colab-latest"
        name: "Qwen3-TTS.cpp Colab Latest Build"
        artifacts: "qwen3-tts-colab.tar.gz"
        allowUpdates: true
        replacesArtifacts: true
        makeLatest: true
        body: |
          Automated build for Google Colab (Ubuntu 22.04 + CUDA 12.8).
          **How to use in Colab:**
          ```bash
          !wget -q https://github.com/${{ github.repository }}/releases/download/colab-latest/qwen3-tts-colab.tar.gz
          !tar -xzvf qwen3-tts-colab.tar.gz
          ```
