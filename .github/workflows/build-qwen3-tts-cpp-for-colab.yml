name: Build and Release for Colab

on:
  workflow_dispatch: # 允许手动触发
  push:
    tags:
      - 'v*'

# 必须赋予写权限，否则无法创建 Release
permissions:
  contents: write 

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    
    steps:
    # ================= 1. 拉取源码 (完美替代 git clone & submodule update) =================
    - name: Checkout Target Repository
      uses: actions/checkout@v4
      with:
        # 直接指定官方目标仓库，解决找不到 CMakeLists.txt 的问题
        repository: predict-woo/qwen3-tts.cpp
        # 自动递归拉取子模块，等价于官方的 git submodule update --init --recursive
        submodules: recursive
    # =====================================================================

    # 2. 安装 CUDA Toolkit (Colab 环境需要)
    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.21
      id: cuda-toolkit
      with:
        cuda: '12.8.0'
        method: 'network'
        sub-packages: '["toolkit", "nvcc"]'

    # ================= 3. 编译 GGML (对齐官方文档) =================
    - name: Build GGML with CUDA
      run: |
        # 官方文档: cmake -S ggml -B ggml/build -DGGML_METAL=ON
        # 修正为 Colab 需要的 CUDA，并覆盖常见 Colab GPU 架构 (T4/A100/L4) 防止 OOM
        cmake -S ggml -B ggml/build -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=75
        cmake --build ggml/build --config Release -j$(nproc)
    # =====================================================================

    # ================= 4. 编译主项目 (对齐官方文档) =================
    - name: Build qwen3-tts.cpp
      run: |
        # 官方文档: cmake -S . -B build
        cmake -S . -B build
        cmake --build build --config Release -j$(nproc)
    # =====================================================================

    # 5. 打包产物
    - name: Package Artifacts
      run: |
        mkdir -p colab_dist
        cp build/qwen3-tts-cli colab_dist/
        # 查找并复制可能存在的动态链接库 (如果 CMake 编译为静态库则会自动跳过)
        find ggml/build/src -name "*.so" -exec cp {} colab_dist/ \; 2>/dev/null || true
        tar -czvf qwen3-tts-colab.tar.gz -C colab_dist .

    # 6. 创建或更新 Release
    - name: Create or Update Release
      uses: ncipollo/release-action@v1
      with:
        tag: "colab-latest"
        name: "Qwen3-TTS.cpp Colab Latest Build"
        artifacts: "qwen3-tts-colab.tar.gz"
        allowUpdates: true
        replacesArtifacts: true
        makeLatest: true
        body: |
          Automated build for Google Colab (Ubuntu 22.04 + CUDA 12.8).
          **How to use in Colab:**
          ```bash
          !wget -q https://github.com/${{ github.repository }}/releases/download/colab-latest/qwen3-tts-colab.tar.gz
          !tar -xzvf qwen3-tts-colab.tar.gz
          ```
