name: Build and Release for Colab

on:
  workflow_dispatch: # 允许手动触发
  push:
    tags:
      - 'v*'

# 必须赋予写权限，否则无法创建 Release
permissions:
  contents: write 

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

        # ================= 修复版：智能修复 Submodule 缺失问题 =================
    - name: Ensure GGML Submodule Exists (Auto-Fix)
      run: |
        echo "Attempting to initialize submodules normally..."
        git submodule update --init --recursive || true
        
        # 检查 ggml 目录是否真的存在且包含核心文件
        if [ ! -f "ggml/CMakeLists.txt" ]; then
          echo "::warning::ggml submodule is missing or empty in your repository."
          echo "Fallback: Fetching complete ggml from the original repository..."
          
          # 清理可能存在的空壳目录
          rm -rf ggml
          
          # 1. 克隆原仓库 (使用 --depth 1 加速)
          git clone --depth 1 https://github.com/predict-woo/qwen3-tts.cpp.git /tmp/qwen3-tts-original
          
          # 2. 【关键修复】进入原仓库目录，并强制递归拉取子模块的实际代码
          cd /tmp/qwen3-tts-original
          git submodule update --init --recursive --depth 1
          cd $GITHUB_WORKSPACE
          
          # 3. 将包含完整代码的 ggml 移动到当前工作目录
          mv /tmp/qwen3-tts-original/ggml ./ggml
          rm -rf /tmp/qwen3-tts-original
        fi
        
        # 4. 最终验证并打印目录内容（方便调试）
        if [ ! -f "ggml/CMakeLists.txt" ]; then
          echo "::error::Failed to obtain ggml source code. Contents of ggml directory:"
          ls -la ggml || true
          exit 1
        fi
        echo "✅ Success! ggml is ready and contains CMakeLists.txt."
    # =====================================================================

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.21
      id: cuda-toolkit
      with:
        cuda: '12.8.0'
        method: 'network'
        sub-packages: '["toolkit", "nvcc"]'

    - name: Build GGML with CUDA
      run: |
        # 限制架构为 T4(7.5), A100(8.0), L4(8.9)，防止 CI 编译超时或 OOM
        cmake -S ggml -B ggml/build -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=75
        cmake --build ggml/build --config Release -j$(nproc)

    - name: Build qwen3-tts.cpp
      run: |
        cmake -S . -B build
        cmake --build build --config Release -j$(nproc)

    - name: Package Artifacts
      run: |
        mkdir -p colab_dist
        cp build/qwen3-tts-cli colab_dist/
        # 查找并复制 GGML 编译出的动态链接库 (.so)
        find ggml/build/src -name "*.so" -exec cp {} colab_dist/ \; 2>/dev/null || true
        tar -czvf qwen3-tts-colab.tar.gz -C colab_dist .

    - name: Create or Update Release
      uses: ncipollo/release-action@v1
      with:
        tag: "colab-latest"
        name: "Qwen3-TTS.cpp Colab Latest Build"
        artifacts: "qwen3-tts-colab.tar.gz"
        allowUpdates: true
        replacesArtifacts: true
        makeLatest: true
        body: |
          Automated build for Google Colab (Ubuntu 22.04 + CUDA 12.8).
          **How to use in Colab:**
          ```bash
          !wget -q https://github.com/${{ github.repository }}/releases/download/colab-latest/qwen3-tts-colab.tar.gz
          ```
