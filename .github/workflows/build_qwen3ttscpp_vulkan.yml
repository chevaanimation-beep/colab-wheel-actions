name: Build and Release for Colab (Vulkan)

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*'

permissions:
  contents: write 

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Target Repository
      uses: actions/checkout@v4
      with:
        repository: predict-woo/qwen3-tts.cpp
        submodules: recursive

    # ================= 修复版：使用 LunarG 官方源安装 Vulkan SDK =================
    - name: Install Vulkan SDK
      run: |
        # 1. 添加 LunarG 的 GPG 密钥和 APT 源 (针对 Ubuntu 22.04 Jammy)
        wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
        
        # 2. 更新包列表并安装完整的 Vulkan SDK
        sudo apt-get update
        sudo apt-get install -y vulkan-sdk
        
        # 3. 验证关键工具 (glslc) 是否安装成功
        echo "Checking glslc version:"
        glslc --version
        echo "Checking Vulkan info:"
        vulkaninfo --summary || true
    # =================================================================

    - name: Build GGML with Vulkan
      run: |
        # 开启 Vulkan 后端
        cmake -S ggml -B ggml/build -DGGML_VULKAN=ON
        cmake --build ggml/build --config Release -j$(nproc)

    - name: Build qwen3-tts.cpp
      run: |
        cmake -S . -B build
        cmake --build build --config Release -j$(nproc)

    - name: Package Artifacts
      run: |
        mkdir -p colab_dist
        cp build/qwen3-tts-cli colab_dist/
        
        # 查找并复制编译出的动态链接库 (如 libggml-vulkan.so)
        find ggml/build build -name "*.so*" -exec cp -d {} colab_dist/ \; 2>/dev/null || true
        
        # 打包输出
        tar -czvf qwen3-tts-colab-vulkan.tar.gz -C colab_dist .

    - name: Create or Update Release
      uses: ncipollo/release-action@v1
      with:
        tag: "colab-vulkan-latest" # 使用独立的 tag，避免与 CUDA 版本冲突
        name: "Qwen3-TTS.cpp Colab Latest Build (Vulkan)"
        artifacts: "qwen3-tts-colab-vulkan.tar.gz"
        allowUpdates: true
        replacesArtifacts: true
        makeLatest: true
        body: |
          Automated build for Google Colab (Ubuntu 22.04 + Vulkan).
          **How to use in Colab:**
          ```bash
          !wget -q https://github.com/${{ github.repository }}/releases/download/colab-vulkan-latest/qwen3-tts-colab-vulkan.tar.gz
          !tar -xzvf qwen3-tts-colab-vulkan.tar.gz
          ```
