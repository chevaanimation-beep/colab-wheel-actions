name: Build and Release for Colab (Vulkan Edition)

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*'

permissions:
  contents: write 

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Target Repository
      uses: actions/checkout@v4
      with:
        repository: predict-woo/qwen3-tts.cpp
        submodules: recursive

    # ================= ⚡ 核心修复：安装完整的 Vulkan SDK（包含 glslc） =================
    - name: Setup Vulkan SDK
      uses: jakubito/setup-vulkan-sdk@v1.1.1
      with:
        vulkan-query-version: '1.3.204.1' # 与你日志中发现的 1.3.204 版本匹配
        vulkan-components: 'Vulkan-Headers, Vulkan-Loader, glslang' # 确保包含编译器
        vulkan-use-cache: true

    # ================= 使用 Vulkan 后端编译 GGML =================
    - name: Build GGML with Vulkan
      run: |
        # setup-vulkan-sdk 会自动设置 VULKAN_SDK 环境变量，CMake 能够完美识别
        cmake -S ggml -B ggml/build -DGGML_VULKAN=ON
        cmake --build ggml/build --config Release -j$(nproc)

    # ================= 编译项目核心组件 =================
    - name: Build qwen3-tts.cpp
      run: |
        cmake -S . -B build -DGGML_VULKAN=ON
        cmake --build build --config Release -j$(nproc)

    - name: Package Artifacts
      run: |
        mkdir -p colab_dist
        cp build/qwen3-tts-cli colab_dist/
        
        # 收集编译出的动态链接库
        find ggml/build build -name "*.so*" -exec cp -d {} colab_dist/ \; 2>/dev/null || true
        
        # 打包输出
        tar -czvf qwen3-tts-colab-vulkan.tar.gz -C colab_dist .

    - name: Create or Update Release
      uses: ncipollo/release-action@v1
      with:
        tag: "colab-vulkan-latest"
        name: "Qwen3-TTS.cpp Colab Vulkan Build"
        artifacts: "qwen3-tts-colab-vulkan.tar.gz"
        allowUpdates: true
        replacesArtifacts: true
        makeLatest: true
        body: |
          Automated build for Google Colab (Ubuntu 22.04 + Vulkan Accelerated).
          **How to use in Colab:**
          ```bash
          # 1. 安装 Colab 环境所需的 Vulkan 驱动运行时
          !apt-get update && apt-get install -y libvulkan1 vulkan-tools
          
          # 2. 下载并解压 Vulkan 编译版本的引擎
          !wget -q [https://github.com/$](https://github.com/$){{ github.repository }}/releases/download/colab-vulkan-latest/qwen3-tts-colab-vulkan.tar.gz
          !tar -xzvf qwen3-tts-colab-vulkan.tar.gz
          ```
